name: 📊 WATCHLIST PRO 일일 분석

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 오후 10시 UTC = 다음날 오전 7시 KST (UTC+9)
  workflow_dispatch:         # GitHub UI에서 수동 실행 가능

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # watchlist-archive.json 자동 커밋용

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 분석 실행
        run: node watchlist-auto.js
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: 아카이브 커밋 (변경 있을 때만)
        run: |
          git config user.name  "watchlist-bot"
          git config user.email "watchlist-bot@github-actions"
          git add watchlist-archive.json
          git diff --cached --quiet || git commit -m "📊 $(date +'%Y-%m-%d') 아카이브 업데이트"
          git push

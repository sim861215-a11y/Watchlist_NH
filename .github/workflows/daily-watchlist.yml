name: 📊 WATCHLIST PRO 일일 분석

on:
  schedule:
    - cron: '0 22 * * 4'   # 매일 오후 10시 UTC = 다음날 오전 7시 KST
  workflow_dispatch:

concurrency:
  group: watchlist-pro
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages:    write
      id-token: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 분석 실행
        run: node watchlist-auto.js
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PAGES_URL:          ${{ secrets.PAGES_URL }}
          REPORT_PASSWORD:    ${{ secrets.REPORT_PASSWORD }}

      - name: 아카이브 & 리포트 커밋
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 아카이브 업데이트"
          file_pattern: "watchlist-archive.json docs/index.html"
          push_options: '--force'

      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./docs
          keep_files:   false

name: 📊 WATCHLIST PRO 일일 분석

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 오후 10시 UTC = 다음날 오전 7시 KST
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages:    write
      id-token: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 분석 실행
        run: node watchlist-auto.js
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PAGES_URL:          ${{ secrets.PAGES_URL }}
          REPORT_PASSWORD:    ${{ secrets.REPORT_PASSWORD }}

      - name: 아카이브 & 리포트 커밋
        run: |
          git config user.name  "watchlist-bot"
          git config user.email "watchlist-bot@github-actions"
          git add watchlist-archive.json docs/index.html
          git diff --cached --quiet || git commit -m "📊 $(date +'%Y-%m-%d') 리포트 업데이트"
          git pull --rebase origin main
          git push

      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./docs
          keep_files:   false
